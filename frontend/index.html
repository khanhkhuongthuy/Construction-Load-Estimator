<!DOCTYPE html>
<html>
<head>
    <title>Construction Load Estimator</title>
</head>
<body>
    <h1>Construction Load Estimator</h1>
    <p>Upload your materials.txt file to calculate total weight + 20% overhead.</p>

    <form action="/calculate" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Calculate</button>
    </form>
</body>
</html>
<script>
    fetch("https://sba-construction-load-estimator2.azurewebsites.net/api/ConstructionLoad")
        .then(r => r.text())
        .then(d => console.log("Backend response:", d))
        .catch(e => console.error(e));
</script>
